<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Codex Usage Pet</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section id="panel" class="panel">
        <div class="window-actions">
          <button id="character-toggle" title="切换角色" aria-label="切换角色" data-tooltip="切换角色">◉</button>
          <button id="skin-toggle" title="切换皮肤" aria-label="切换皮肤" data-tooltip="切换皮肤">◇</button>
          <button id="refresh" title="刷新" aria-label="刷新" data-tooltip="刷新">↻</button>
          <button id="pin" title="置顶窗口" aria-label="置顶窗口" data-tooltip="置顶窗口">⌖</button>
          <button id="close" title="关闭" aria-label="关闭" data-tooltip="关闭">×</button>
        </div>

        <div class="hero">
          <div class="pet-wrap">
            <div id="pet" class="pet"></div>
          </div>
          <div class="identity">
            <div class="skill-strip" aria-hidden="true">
              <span class="skill-slot skill-slot-blue">Q</span>
              <span class="skill-slot skill-slot-gold">W</span>
              <span class="skill-slot skill-slot-cyan">E</span>
              <span class="skill-slot skill-slot-violet">R</span>
              <span class="skill-slot skill-slot-summoner">D</span>
              <span class="skill-slot skill-slot-summoner">F</span>
            </div>
            <div id="task-bubble" class="bubble">
              <span id="bubble-status" class="bubble-status"></span>
              <span id="bubble-text">Coding<br />together!</span>
            </div>
            <div id="xp-line" class="xp-line">
              <span id="level" class="level">
                <span id="level-number" class="level-number">1</span>
                <span class="level-prefix">lv.</span>
              </span>
              <div class="xp-stack">
                <div class="xp-track"><div id="xp-bar" class="xp-bar"></div></div>
                <div id="xp-text" class="xp-text">0 / 0 XP</div>
              </div>
            </div>
          </div>
        </div>

        <section class="limit-row red">
          <div class="limit-icon">♥</div>
          <div class="limit-body">
            <div class="limit-head">
              <div class="limit-label">
                <strong id="primary-title">5h limit</strong>
                <span id="primary-reset" class="limit-reset">--</span>
              </div>
              <span id="primary-left" class="limit-percent">-- left</span>
            </div>
            <div class="limit-track">
              <div id="primary-bar" class="limit-bar"></div>
              <span id="primary-cursor" class="reset-cursor"></span>
            </div>
          </div>
        </section>

        <section class="limit-row blue">
          <div class="limit-icon">♦</div>
          <div class="limit-body">
            <div class="limit-head">
              <div class="limit-label">
                <strong id="secondary-title">weekly limit</strong>
                <span id="secondary-reset" class="limit-reset">--</span>
              </div>
              <span id="secondary-left" class="limit-percent">-- left</span>
            </div>
            <div class="limit-track">
              <div id="secondary-bar" class="limit-bar"></div>
              <span id="secondary-cursor" class="reset-cursor"></span>
            </div>
          </div>
        </section>

        <div id="resize-grip" class="resize-grip" title="Resize">↘</div>

        <footer class="meta">
          <span id="plan">plan: --</span>
          <span id="updated">not updated yet</span>
        </footer>
        <span id="rift-level" class="rift-level" aria-hidden="true">1</span>
        <div id="xp-tooltip" class="xp-tooltip" role="tooltip"></div>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
